site_name: "OpenSTB simulator"
copyright: Copyright &copy; OpenSTB contributors
repo_url: https://github.com/openSTB/simulator
repo_name: openSTB/simulator

theme:
  name: material
  font: false
  features:
    - content.code.copy
    - content.footnote.tooltips
    - navigation.tabs
    - navigation.tabs.sticky
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light blue
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: orange
      toggle:
        icon: material/weather-night
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github

plugins:
  - api-autonav:
      modules: ['src/openstb']
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          inventories:
            - url: https://docs.python.org/3/objects.inv
              domains: [py, std]
            - https://numpy.org/doc/stable/objects.inv
            - https://docs.scipy.org/doc/scipy/objects.inv
            - url: https://docs.dask.org/en/stable/objects.inv
              domains: [py, std]
            - url: https://distributed.dask.org/en/stable/objects.inv
              domains: [py, std]
          options:
            docstring_section_style: table
            docstring_style: "numpy"
            filters: ["!^_"]
            merge_init_into_class: true
            separate_signature: true
            show_root_heading: false
            show_signature_annotations: false
            signature_crossrefs: true
            summary: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
  - search

markdown_extensions:
  - admonition
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - static/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

watch:
  - src
  - mkdocs.yaml

nav:
  - index.md
  - Getting started:
    - getting_started/install.md
    - Examples:
      - examples/simple_points.md
  - Concepts:
    - concepts/result_format.md
  - Plugins:
    - plugins/index.md
    - plugins/specifying.md
    - Controller:
      - Overview: plugins/controller/overview.md
      - plugins/controller/simple_points.md
      - plugins/controller/interface.md
      - Helpers: plugins/controller/helpers.md
    - Distortion:
      - Overview: plugins/distortion/overview.md
      - plugins/distortion/anslie_mccolm.md
      - plugins/distortion/doppler.md
      - plugins/distortion/geometric_spreading.md
      - plugins/distortion/rectangular_beampattern.md
      - Plugin interface: plugins/distortion/interface.md
    - Environment:
      - Overview: plugins/environment/overview.md
      - plugins/environment/invariant.md
      - Plugin interface: plugins/environment/interface.md
    - Ping times:
      - Overview: plugins/ping_times/overview.md
      - plugins/ping_times/constant_distance.md
      - plugins/ping_times/constant_interval.md
      - plugins/ping_times/interface.md
    - Result converter:
      - Overview: plugins/result_converter/overview.md
      - MATLAB: plugins/result_converter/matlab.md
      - NumPy: plugins/result_converter/numpy.md
      - Plugin interface: plugins/result_converter/interface.md
    - Scattering model:
      - Overview: plugins/scattering_model/overview.md
      - plugins/scattering_model/constant.md
      - plugins/scattering_model/lambertian.md
      - Plugin interface: plugins/scattering_model/interface.md
    - Signal:
      - Overview: plugins/signal/overview.md
      - HFM chirp: plugins/signal/hfm_chirp.md
      - LFM chirp: plugins/signal/lfm_chirp.md
      - Plugin interface: plugins/signal/interface.md
    - Trajectory:
      - Overview: plugins/trajectory/overview.md
      - Circular: plugins/trajectory/circular.md
      - Linear: plugins/trajectory/linear.md
      - Plugin interface: plugins/trajectory/interface.md
    - included_plugins/index.md
  - Release notes:
    - release_notes/v0.9.0.md
    - release_notes/v0.8.1.md
    - release_notes/v0.8.0.md
    - release_notes/v0.7.0.md
    - release_notes/v0.6.1.md
    - release_notes/v0.6.0.md
    - release_notes/v0.5.0.md
