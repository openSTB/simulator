name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  latest:
    name: Latest dependencies for supported Python versions
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install package
        run: uv pip install mypy -e .[tests,MPI]
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Run unit tests
        run: pytest --cov-report=xml


  windows:
    name: Run tests under Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install package
        run: uv pip install mypy -e .[tests,MPI]
        env:
          UV_LINK_MODE: copy  # On separate drives, so stop the warning
          UV_SYSTEM_PYTHON: 1

      - name: Run unit tests
        run: pytest --cov-report=xml
